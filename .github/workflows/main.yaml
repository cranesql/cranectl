name: Main

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io

jobs:
  unit_test:
    name: Unit Test
    uses: ./.github/workflows/unit-test.yaml
    secrets: inherit

  docker_build:
    name: Docker Build (${{ matrix.variant.name }}, ${{ matrix.arch.name }})
    needs: unit_test
    runs-on: ${{ matrix.arch.runner }}
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        variant:
          - name: default
            dockerfile: Dockerfile
            image: ghcr.io/${{ github.repository }}
          - name: postgres-nio
            dockerfile: Dockerfile.postgres-nio
            image: ghcr.io/${{ github.repository }}/postgres-nio
        arch:
          - name: amd64
            runner: ubuntu-latest
          - name: arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.variant.dockerfile }}
          push: true
          tags: ${{ matrix.variant.image }}:sha-${{ github.sha }}-${{ matrix.arch.name }}
          cache-from: type=gha,scope=${{ matrix.variant.name }}-${{ matrix.arch.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.variant.name }}-${{ matrix.arch.name }}

  docker_manifest:
    name: Docker Manifest (${{ matrix.variant }})
    needs: docker_build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - variant: default
            image: ghcr.io/${{ github.repository }}
          - variant: postgres-nio
            image: ghcr.io/${{ github.repository }}/postgres-nio
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ matrix.image }}
          tags: |
            type=sha
            type=raw,value=latest

      - name: Create and push multi-arch manifest
        run: |
          echo "$TAGS" | while read -r TAG; do
            docker buildx imagetools create -t "$TAG" \
              "${{ matrix.image }}:sha-${{ github.sha }}-amd64" \
              "${{ matrix.image }}:sha-${{ github.sha }}-arm64"
          done
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
