name: Main

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io

jobs:
  unit_test:
    name: Unit Test
    uses: ./.github/workflows/unit-test.yaml
    secrets: inherit

  docker_build:
    name: Docker Build (${{ matrix.variant.name }}, ${{ matrix.arch.name }})
    needs: unit_test
    runs-on: ${{ matrix.arch.runner }}
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        variant:
          - name: default
            tag_suffix: ""
          - name: postgres-nio
            tag_suffix: -postgres-nio
        arch:
          - name: amd64
            runner: ubuntu-latest
          - name: arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Dockerfile
        run: make Dockerfile.${{ matrix.variant.name }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.${{ matrix.variant.name }}
          push: true
          tags: ghcr.io/${{ github.repository }}:sha-${{ github.sha }}${{ matrix.variant.tag_suffix }}-${{ matrix.arch.name }}
          cache-from: type=gha,scope=${{ matrix.variant.name }}-${{ matrix.arch.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.variant.name }}-${{ matrix.arch.name }}

  docker_manifest:
    name: Docker Manifest (${{ matrix.variant }})
    needs: docker_build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - variant: default
            tag_suffix: ""
          - variant: postgres-nio
            tag_suffix: -postgres-nio
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Generate Dockerfile
        run: make Dockerfile.${{ matrix.variant }}

      - name: Extract description
        id: description
        run: echo "value=$(grep 'org.opencontainers.image.description=' Dockerfile.${{ matrix.variant }} | sed 's/.*description="\(.*\)"/\1/')" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,suffix=${{ matrix.tag_suffix }}
            type=raw,value=latest${{ matrix.tag_suffix }}

      - name: Create and push multi-arch manifest
        run: |
          echo "$TAGS" | while read -r TAG; do
            docker buildx imagetools create -t "$TAG" \
              --annotation "index:org.opencontainers.image.description=${{ steps.description.outputs.value }}" \
              "ghcr.io/${{ github.repository }}:sha-${{ github.sha }}${{ matrix.tag_suffix }}-amd64" \
              "ghcr.io/${{ github.repository }}:sha-${{ github.sha }}${{ matrix.tag_suffix }}-arm64"
          done
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
